<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1456 180" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="#1c1917"/>
    </pattern>
    <radialGradient id="glow1" cx="20%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1456" height="180" fill="#0c0a09"/>
  <rect width="1456" height="180" fill="url(#grid)" opacity="0.55"/>
  <rect width="1456" height="180" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1456" height="2" fill="url(#topline)"/>

  <g transform="translate(56, 95)">
    <circle cx="6" cy="6" r="6" fill="#fb923c"/>
    <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" font-weight="500" fill="#a8a29e" letter-spacing="4">JUSTIN FOWLER</text>
  </g>

  <text x="728" y="103" text-anchor="middle" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-weight="300" font-size="34" fill="#fafaf9" letter-spacing="-1">Notes from <tspan font-style="italic" fill="#fdba74">doing the work</tspan>, in public.</text>

  <text x="1400" y="103" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="13" font-weight="500" fill="#57534e" letter-spacing="3.5">JUSTINFOWLER.COM</text>
</svg>
