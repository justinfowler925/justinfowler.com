<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c1917"/>
    </pattern>
    <radialGradient id="glow1" cx="22%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="#0c0a09"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.55"/>
  <rect width="1280" height="640" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1280" height="2" fill="url(#topline)"/>

  <g transform="translate(80, 80)">
    <circle cx="6" cy="6" r="6" fill="#fb923c"/>
    <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="500" fill="#a8a29e" letter-spacing="4">JUSTINFOWLER925</text>
  </g>
  <text x="1200" y="91" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="500" fill="#57534e" letter-spacing="3.5">GITHUB.COM/JUSTINFOWLER925</text>

  <g transform="translate(80, 0)">
    <text y="240" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="16" font-weight="500" fill="#fb923c" letter-spacing="5">— REPO_NAME</text>
    <g font-family="ui-serif, Georgia, 'Times New Roman', serif" font-weight="300" fill="#fafaf9" letter-spacing="-2">
      <text y="340" font-size="68">One-line <tspan font-style="italic" fill="#fdba74">repo</tspan> tagline goes here</text>
      <text y="420" font-size="68">across two visual lines.</text>
    </g>
    <text y="510" font-family="ui-serif, Georgia, 'Times New Roman', serif" font-style="italic" font-size="22" font-weight="300" fill="#a8a29e">Justin Fowler · agentic systems · production not slideware</text>
  </g>
</svg>
