<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c1917"/>
    </pattern>
    <radialGradient id="glow1" cx="78%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="topline" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1500" height="500" fill="#0c0a09"/>
  <rect width="1500" height="500" fill="url(#grid)" opacity="0.55"/>
  <rect width="1500" height="500" fill="url(#glow1)"/>
  <rect x="0" y="0" width="1500" height="2" fill="url(#topline)"/>

  <!-- X profile pic overlays bottom-left ~200×200 with ~40px padding. Keep content right of x:280, above y:380. -->
  <g transform="translate(72, 64)">
    <circle cx="6" cy="6" r="6" fill="#fb923c"/>
    <text x="28" y="11" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="500" fill="#a8a29e" letter-spacing="4">JUSTIN FOWLER</text>
  </g>
  <text x="1428" y="75" text-anchor="end" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="14" font-weight="500" fill="#57534e" letter-spacing="3.5">JUSTINFOWLER.COM</text>

  <g transform="translate(320, 0)">
    <g font-family="ui-mono, 'JetBrains Mono', Menlo, monospace">
      <rect x="0" y="178" width="28" height="2" fill="#fb923c"/>
      <text x="44" y="184" font-size="15" font-weight="500" fill="#fb923c" letter-spacing="4.5">SHIPPING AGENTIC SYSTEMS IN PUBLIC</text>
    </g>
    <g font-family="ui-serif, Georgia, 'Times New Roman', serif" font-weight="300" fill="#fafaf9" letter-spacing="-1.8">
      <text x="0" y="258" font-size="62">I build <tspan font-style="italic" fill="#fdba74">AI</tspan> for people</text>
      <text x="0" y="328" font-size="62">who do the <tspan font-style="italic" fill="#fdba74">actual</tspan> work.</text>
    </g>
  </g>
</svg>
