<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1c1917"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="circle"><circle cx="400" cy="400" r="400"/></clipPath>
  </defs>
  <g clip-path="url(#circle)">
    <rect width="800" height="800" fill="#0c0a09"/>
    <rect width="800" height="800" fill="url(#grid)" opacity="0.5"/>
    <rect width="800" height="800" fill="url(#glow)"/>

    <!-- pulse dot above monogram -->
    <circle cx="400" cy="280" r="14" fill="#fb923c"/>

    <!-- monogram JF in serif italic -->
    <g font-family="ui-serif, Georgia, 'Times New Roman', serif" font-weight="300" fill="#fafaf9" text-anchor="middle">
      <text x="400" y="490" font-size="280" letter-spacing="-12">
        <tspan>J</tspan><tspan font-style="italic" fill="#fdba74">f</tspan>
      </text>
    </g>

    <!-- mono ring caption -->
    <text x="400" y="680" text-anchor="middle" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="22" font-weight="500" fill="#a8a29e" letter-spacing="6">PRACTITIONER</text>
  </g>
  <!-- thin orange ring -->
  <circle cx="400" cy="400" r="396" fill="none" stroke="#fb923c" stroke-opacity="0.35" stroke-width="2"/>
</svg>
