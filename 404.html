<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>404 — Justin Fowler</title>
<meta name="description" content="That page is not here. The path is wrong, or it was never built. Step back to the front." />
<meta name="theme-color" content="#0c0a09" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..900,0..100&family=JetBrains+Mono:wght@300;400;500&family=Geist:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #0c0a09;
    --ink-2: #1c1917;
    --ink-3: #292524;
    --paper: #fafaf9;
    --paper-2: #e7e5e4;
    --mute: #78716c;
    --mute-2: #57534e;
    --accent: #fb923c;
    --accent-2: #fdba74;
    --serif: 'Fraunces', Georgia, serif;
    --mono: 'JetBrains Mono', 'Courier New', monospace;
    --sans: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    line-height: 1.5;
    min-height: 100vh;
    display: grid;
    place-items: center;
    overflow-x: hidden;
  }

  ::selection { background: var(--accent); color: var(--ink); }

  .grain {
    position: fixed; inset: 0; pointer-events: none; z-index: 1; opacity: 0.04;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
  }

  .wrap {
    max-width: 720px;
    padding: 48px 24px;
    position: relative;
    z-index: 2;
    text-align: center;
  }

  @media (min-width: 768px) {
    .wrap { padding: 80px 48px; }
  }

  .mark {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--mute);
    margin-bottom: 56px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .mark .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2.4s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .code {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--accent);
    margin-bottom: 32px;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.1s forwards;
  }

  h1 {
    font-family: var(--serif);
    font-variation-settings: 'opsz' 144, 'SOFT' 50;
    font-size: clamp(96px, 22vw, 220px);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.05em;
    margin-bottom: 28px;
    color: var(--paper);
    opacity: 0;
    animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--accent-2);
    font-weight: 300;
  }

  .lede {
    font-family: var(--serif);
    font-size: clamp(20px, 2.4vw, 26px);
    font-weight: 300;
    line-height: 1.4;
    color: var(--paper-2);
    max-width: 520px;
    margin: 0 auto 48px;
    opacity: 0;
    animation: rise 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
  }

  .lede em { color: var(--accent-2); font-style: italic; }

  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.6s forwards;
  }

  .btn {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    text-decoration: none;
    padding: 14px 22px;
    border: 1px solid var(--ink-3);
    color: var(--paper);
    transition: border-color 0.2s, color 0.2s, background 0.2s;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--ink);
  }
  .btn.primary:hover {
    background: var(--accent-2);
    border-color: var(--accent-2);
    color: var(--ink);
  }

  .meta {
    margin-top: 56px;
    padding-top: 32px;
    border-top: 1px solid var(--ink-3);
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--mute);
    opacity: 0;
    animation: fadeIn 0.8s ease-out 0.8s forwards;
  }

  .meta .label { color: var(--mute-2); margin-right: 8px; }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>

<div class="grain"></div>

<div class="wrap">
  <div class="mark"><span class="dot"></span> Justin Fowler</div>

  <div class="code">Signal lost</div>

  <h1>4<em>0</em>4</h1>

  <p class="lede">
    That page <em>isn't here</em>. The path is wrong, or it was never built.
    Step back to the front.
  </p>

  <div class="actions">
    <a class="btn primary" href="/">Return home</a>
    <a class="btn" href="mailto:justin@justinfowler.com">Email me</a>
  </div>

  <div class="meta">
    <span><span class="label">Status</span> 404 · Not Found</span>
  </div>
</div>

</body>
</html>
